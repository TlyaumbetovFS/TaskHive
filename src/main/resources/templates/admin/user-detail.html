<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('User Management — TaskHive')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <div class="card p-4">
                <h4 class="mb-3" th:text="${user.email}">User</h4>

                <div class="mb-2"><small class="text-muted-custom">ID</small><br/><span th:text="${user.userId}"></span></div>
                <div class="mb-2"><small class="text-muted-custom">Display Name</small><br/><span th:text="${user.displayName ?: 'Not set'}"></span></div>
                <div class="mb-2">
                    <small class="text-muted-custom">Status</small><br/>
                    <span class="badge" th:classappend="${user.active ? 'bg-success' : 'bg-danger'}" th:text="${user.active ? 'Active' : 'Inactive'}"></span>
                </div>
                <div class="mb-3"><small class="text-muted-custom">Created</small><br/><span th:text="${#temporals.format(user.createdAt, 'dd.MM.yyyy HH:mm')}"></span></div>

                <h6 class="text-muted-custom">Roles</h6>
                <div class="mb-3">
                    <span th:each="role : ${roles}" class="badge bg-dark me-1" th:text="${role.globalRole.roleName}"></span>
                    <span th:if="${#lists.isEmpty(roles)}" class="text-muted-custom">No roles</span>
                </div>

                <hr/>
                <h6 class="text-muted-custom">Actions</h6>
                <div class="d-flex gap-2 flex-wrap">
                    <form th:if="${user.active}" th:action="@{/admin/users/{id}/deactivate(id=${user.userId})}" method="post">
                        <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Deactivate?')">Deactivate</button>
                    </form>
                    <form th:if="${!user.active}" th:action="@{/admin/users/{id}/activate(id=${user.userId})}" method="post">
                        <button type="submit" class="btn btn-sm btn-outline-success">Activate</button>
                    </form>
                    <form th:if="${!isAdmin}" th:action="@{/admin/users/{id}/grant-admin(id=${user.userId})}" method="post">
                        <button type="submit" class="btn btn-sm btn-accent">Grant Admin</button>
                    </form>
                    <form th:if="${isAdmin}" th:action="@{/admin/users/{id}/revoke-admin(id=${user.userId})}" method="post">
                        <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Revoke admin?')">Revoke Admin</button>
                    </form>
                </div>
            </div>

            <a href="/admin" class="btn btn-link text-muted-custom mt-3 ps-0"><i class="bi bi-arrow-left"></i> Back to admin</a>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
