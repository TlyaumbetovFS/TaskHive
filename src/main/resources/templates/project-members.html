<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Project Members — TaskHive')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container">
    <h3 class="mb-1" th:text="'Members — ' + ${project.name}">Members</h3>

    <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>

    <div class="card p-3 mt-4">
        <h6>Add Member</h6>
        <form th:action="@{/workspaces/{wId}/projects/{pId}/members(wId=${workspaceId}, pId=${projectId})}"
              th:object="${memberDto}" method="post" class="d-flex gap-2">
            <input type="email" th:field="*{email}" class="form-control" placeholder="user@example.com" required/>
            <button type="submit" class="btn btn-accent">Add</button>
        </form>
    </div>

    <div class="card mt-3">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr><th>Email</th><th>Role</th><th>Since</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="member : ${members}">
                        <td th:text="${member.user.email}"></td>
                        <td><span class="badge" th:classappend="${member.role.name() == 'ADMIN' ? 'bg-dark' : 'bg-secondary'}" th:text="${member.role}"></span></td>
                        <td class="text-muted-custom" th:text="${#temporals.format(member.validFrom, 'dd.MM.yyyy')}"></td>
                        <td>
                            <form th:if="${member.role.name() != 'ADMIN'}"
                                  th:action="@{/workspaces/{wId}/projects/{pId}/members/{mId}/remove(wId=${workspaceId}, pId=${projectId}, mId=${member.projectMemberId})}"
                                  method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Remove?')">Remove</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <a th:href="@{/workspaces/{wId}/projects/{pId}(wId=${workspaceId}, pId=${projectId})}" class="btn btn-link text-muted-custom mt-3 ps-0">
        <i class="bi bi-arrow-left"></i> Back to tasks
    </a>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
