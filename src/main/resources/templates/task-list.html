<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${project.name} + ' — Tasks')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="mb-0" th:text="${project.name}">Project</h3>
            <small class="text-muted-custom" th:text="${project.projectKey}"></small>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/workspaces/{wId}/projects/{pId}/members(wId=${workspaceId}, pId=${projectId})}"
               class="btn btn-outline-secondary btn-sm"><i class="bi bi-people"></i> Members</a>
            <a th:href="@{/workspaces/{wId}/projects/{pId}/tasks/create(wId=${workspaceId}, pId=${projectId})}"
               class="btn btn-accent btn-sm"><i class="bi bi-plus-lg"></i> New Task</a>
        </div>
    </div>

    <div class="card" th:if="${!#lists.isEmpty(tasks)}">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Key</th>
                        <th>Title</th>
                        <th>Status</th>
                        <th>Priority</th>
                        <th>Assignee</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="task : ${tasks}">
                        <td>
                            <a th:href="@{/workspaces/{wId}/projects/{pId}/tasks/{tId}(wId=${workspaceId}, pId=${projectId}, tId=${task.taskId})}"
                               class="fw-bold text-decoration-none" style="color: var(--th-dark);"
                               th:text="${project.projectKey} + '-' + ${task.taskNumber}"></a>
                        </td>
                        <td th:text="${task.title}"></td>
                        <td><span class="badge badge-status" th:classappend="'badge-' + ${task.status.name}" th:text="${task.status.name}"></span></td>
                        <td>
                            <span th:if="${task.priority != null}" class="badge badge-status" th:classappend="'badge-' + ${task.priority}" th:text="${task.priority}"></span>
                            <span th:if="${task.priority == null}" class="text-muted-custom">—</span>
                        </td>
                        <td th:text="${task.assignee != null ? task.assignee.email : '—'}" th:class="${task.assignee == null ? 'text-muted-custom' : ''}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <p th:if="${#lists.isEmpty(tasks)}" class="text-muted-custom mt-3">No tasks yet.</p>

    <a th:href="@{/workspaces/{id}(id=${workspaceId})}" class="btn btn-link text-muted-custom mt-3 ps-0"><i class="bi bi-arrow-left"></i> Back to projects</a>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
